<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear Programming Explorer — Light Academic</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=IBM+Plex+Mono:wght@400;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f5f0e8;
    --surface: #fdfaf4;
    --surf2:   #f0ebe0;
    --border:  #d6cdb8;
    --border2: #c2b89e;
    --accent:  #1a3a6b;
    --green:   #16a34a;
    --red:     #b83232;
    --obj:     #9c5c00;
    --text:    #1e1a14;
    --text2:   #5a5040;
    --text3:   #a09070;
    --c0:      #1a3a6b; --c1: #b83232; --c2: #7c3aed; --c3: #b45309;
    --shadow:  0 1px 4px rgba(30,26,20,.1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; font-size: 14px; }

  header {
    background: var(--accent); border-bottom: 3px solid #0f2347;
    padding: 0 20px; display: flex; align-items: center; gap: 14px; height: 48px;
  }
  header h1 { font-family: 'Lora', serif; font-size: 1.2rem; color: #f5f0e8; }
  header span { font-family: 'IBM Plex Mono', monospace; font-size: .7rem; color: rgba(245,240,232,.5); border: 1px solid rgba(245,240,232,.2); padding: 2px 6px; border-radius: 3px; }

  .main-layout { display: grid; grid-template-columns: 420px 1fr; height: calc(100vh - 48px); }

  /* ── LEFT PANEL ── */
  .left-panel {
    background: var(--surface); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px;
  }

  .section-label {
    font-size: .65rem; font-weight: 600; letter-spacing: .1em; color: var(--text3);
    text-transform: uppercase; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
  }

  .card { background: var(--surf2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; box-shadow: var(--shadow); }
  
  .num-input {
    width: 60px; background: var(--surface); border: 1.5px solid var(--border2);
    border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: .9rem; padding: 4px; text-align: center;
  }

  /* Results Section in Sidebar */
  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; transition: 0.3s; }
  .stat-box.highlight { border-color: var(--green); background: #f0fdf4; }
  .sb-label { font-size: .6rem; font-weight: 700; color: var(--text3); text-transform: uppercase; }
  .sb-val { font-family: 'IBM Plex Mono', monospace; font-size: .95rem; font-weight: 600; color: var(--text); }
  
  .corner-list { font-family: 'IBM Plex Mono', monospace; font-size: .75rem; color: var(--text2); line-height: 1.5; }

  /* ── RIGHT PANEL ── */
  .right-panel { display: flex; flex-direction: column; height: 100%; position: relative; }
  .graph-area { flex: 1; background: #fff; position: relative; }
  canvas#lp-canvas { display: block; width: 100%; height: 100%; }

  .bottom-controls {
    height: 70px; background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 20px;
  }

  .slider-box { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  input[type=range] { cursor: pointer; accent-color: var(--obj); width: 100%; }

  .btn-show, .btn-opt { padding: 10px 18px; border-radius: 5px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
  .btn-show { background: var(--accent); color: white; }
  .btn-opt { background: var(--green); color: white; display: none; }
  .btn-opt.show { display: block; }

  .legend { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 0.7rem; }
  
  .constraint-row { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
  .sign-sel { background: var(--surface); border: 1.5px solid var(--border2); border-radius: 4px; padding: 3px; font-family: 'IBM Plex Mono'; }
</style>
</head>
<body>

<header>
  <h1>Linear Programming Explorer</h1>
  <span>2-Var Academic v2.1</span>
</header>

<div class="main-layout">
  <div class="left-panel">
    <div class="card">
      <div class="section-label">Objective & Constraints</div>
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
        <select id="goal" onchange="setGoal(this.value)" class="sign-sel">
          <option value="max">Maximize</option>
          <option value="min">Minimize</option>
        </select>
        <span style="font-family: 'IBM Plex Mono'">Z = </span>
        <input type="number" class="num-input" id="c1" placeholder="x1" oninput="onInput()">
        <input type="number" class="num-input" id="c2" placeholder="x2" oninput="onInput()">
      </div>
      
      <div id="constraint-block"></div>
      
      <div style="margin-top:10px; display:flex; justify-content: space-between; align-items: center;">
        <select id="nc-sel" onchange="rebuildConstraints()" class="sign-sel">
          <option value="1">1 Constraint</option>
          <option value="2" selected>2 Constraints</option>
          <option value="3">3 Constraints</option>
          <option value="4">4 Constraints</option>
        </select>
        <label style="font-size:0.75rem;"><input type="checkbox" id="nn-check" checked onchange="onInput()"> x₁, x₂ ≥ 0</label>
      </div>
    </div>

    <div class="card">
      <div class="section-label">Model Summary</div>
      <div id="formula-display" style="font-family:'IBM Plex Mono'; font-size:0.8rem; color:var(--text2);"></div>
    </div>

    <div class="card" id="results-card">
      <div class="section-label">Optimization Results</div>
      <div class="results-grid">
        <div class="stat-box" id="box-x1"><div class="sb-label">x₁</div><div class="sb-val" id="val-x1">—</div></div>
        <div class="stat-box" id="box-x2"><div class="sb-label">x₂</div><div class="sb-val" id="val-x2">—</div></div>
        <div class="stat-box" style="grid-column: span 2" id="box-z">
          <div class="sb-label">Optimal Z</div><div class="sb-val" id="val-z" style="color:var(--obj)">—</div>
        </div>
      </div>
      <div class="section-label">Feasible Corner Points</div>
      <div id="corner-list" class="corner-list"></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="graph-area">
      <canvas id="lp-canvas"></canvas>
      <div class="legend" id="legend-box"></div>
    </div>

    <div class="bottom-controls">
      <div class="slider-box">
        <div class="sb-label">Explore Objective (Z-Line)</div>
        <input type="range" id="obj-slider" min="0" max="1000" value="300" oninput="onSlider()" disabled>
      </div>
      <button class="btn-show" onclick="showObjLine()">Show Z-line</button>
      <button class="btn-opt" id="btn-opt" onclick="optimize()">⬡ Optimize</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#1a3a6b','#b83232','#7c3aed','#b45309'];
let numC = 2, objActive = false, sliderVal = 0.3, optimized = false, goal = 'max';
let corners = [], bestPt = null;

const canvas = document.getElementById('lp-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width = r.width * devicePixelRatio;
  canvas.height = r.height * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  draw();
}
window.addEventListener('resize', resizeCanvas);

function rebuildConstraints() {
  const container = document.getElementById('constraint-block');
  numC = parseInt(document.getElementById('nc-sel').value);
  let html = '';
  for (let i = 0; i < numC; i++) {
    html += `<div class="constraint-row">
      <span style="color:${COLORS[i]}; font-weight:bold; width:20px;">C${i+1}</span>
      <input type="number" class="num-input" id="a${i}1" placeholder="x1" oninput="onInput()">
      <input type="number" class="num-input" id="a${i}2" placeholder="x2" oninput="onInput()">
      <select class="sign-sel" id="s${i}" onchange="onInput()"><option value="le">≤</option><option value="ge">≥</option></select>
      <input type="number" class="num-input" id="b${i}" placeholder="b" oninput="onInput()">
    </div>`;
  }
  container.innerHTML = html;
  onInput();
}

function getModel() {
  return {
    c: [parseFloat(document.getElementById('c1').value) || 0, parseFloat(document.getElementById('c2').value) || 0],
    a: Array.from({length: numC}, (_, i) => [parseFloat(document.getElementById(`a${i}1`).value), parseFloat(document.getElementById(`a${i}2`).value)]),
    b: Array.from({length: numC}, (_, i) => parseFloat(document.getElementById(`b${i}`).value)),
    sg: Array.from({length: numC}, (_, i) => document.getElementById(`s${i}`).value),
    xmax: 10, ymax: 10,
    nn: document.getElementById('nn-check').checked
  };
}

// Fixed calculation: ensures clean rounding to 2 decimal places for Z-value stability
function zVal(m, pt) {
  const val = m.c[0] * pt[0] + m.c[1] * pt[1];
  return Math.round((val + Number.EPSILON) * 100) / 100;
}

function getCorners(m) {
  let cands = [[0,0], [m.xmax,0], [0,m.ymax]];
  let lines = m.nn ? [[1,0,0], [0,1,0]] : [];
  for(let i=0; i<numC; i++) if(!isNaN(m.a[i][0])) lines.push([m.a[i][0], m.a[i][1], m.b[i]]);
  
  for(let i=0; i<lines.length; i++) {
    for(let j=i+1; j<lines.length; j++) {
      const d = lines[i][0]*lines[j][1] - lines[i][1]*lines[j][0];
      if(Math.abs(d) > 1e-6) {
        const px = (lines[i][2]*lines[j][1] - lines[i][1]*lines[j][2])/d;
        const py = (lines[i][0]*lines[j][2] - lines[i][2]*lines[j][0])/d;
        if(px >= -0.001 && py >= -0.001 && px <= m.xmax && py <= m.ymax) cands.push([px,py]);
      }
    }
  }
  return cands.filter(pt => {
    if(m.nn && (pt[0] < -0.001 || pt[1] < -0.001)) return false;
    return m.a.every((coeffs, i) => {
      if(isNaN(coeffs[0])) return true;
      const lhs = coeffs[0]*pt[0] + coeffs[1]*pt[1];
      return m.sg[i] === 'le' ? lhs <= m.b[i] + 0.001 : lhs >= m.b[i] - 0.001;
    });
  });
}

function draw() {
  const m = getModel();
  const r = canvas.parentElement.getBoundingClientRect();
  const w = r.width, h = r.height;
  const pad = 40;
  
  const tx = x => pad + (x / m.xmax) * (w - pad * 2);
  const ty = y => h - pad - (y / m.ymax) * (h - pad * 2);

  ctx.clearRect(0,0,w,h);

  // Axes
  ctx.strokeStyle = '#999'; ctx.beginPath();
  ctx.moveTo(pad, pad); ctx.lineTo(pad, h-pad); ctx.lineTo(w-pad, h-pad); ctx.stroke();

  corners = getCorners(m);
  if(corners.length > 2) {
    const center = corners.reduce((a,b)=>[a[0]+b[0], a[1]+b[1]], [0,0]).map(v=>v/corners.length);
    const sorted = [...corners].sort((a,b)=> Math.atan2(a[1]-center[1], a[0]-center[0]) - Math.atan2(b[1]-center[1], b[0]-center[0]));
    ctx.fillStyle = 'rgba(22,163,74,0.15)'; ctx.beginPath();
    ctx.moveTo(tx(sorted[0][0]), ty(sorted[0][1]));
    sorted.forEach(p => ctx.lineTo(tx(p[0]), ty(p[1])));
    ctx.closePath(); ctx.fill();
  }

  // Objective Line
  if(objActive) {
    const allZ = corners.length ? corners.map(p => zVal(m,p)) : [0, 100];
    const zMin = Math.min(...allZ), zMax = Math.max(...allZ);
    const curZ = zMin + sliderVal * (zMax - zMin);
    
    ctx.strokeStyle = 'var(--obj)'; ctx.setLineDash([5,5]); ctx.beginPath();
    if(m.c[1] !== 0) {
      ctx.moveTo(tx(0), ty(curZ/m.c[1])); ctx.lineTo(tx(m.xmax), ty((curZ-m.c[0]*m.xmax)/m.c[1]));
    }
    ctx.stroke(); ctx.setLineDash([]);
  }

  updateUI(m);
}

function updateUI(m) {
  document.getElementById('corner-list').innerHTML = corners.map(p => `• (${p[0].toFixed(2)}, ${p[1].toFixed(2)}) → Z: ${zVal(m,p).toFixed(2)}`).join('<br>');
  if(optimized && bestPt) {
    document.getElementById('val-x1').innerText = bestPt[0].toFixed(2);
    document.getElementById('val-x2').innerText = bestPt[1].toFixed(2);
    document.getElementById('val-z').innerText = zVal(m, bestPt).toFixed(2);
  }
}

function setGoal(v) { goal = v; onInput(); }
function onInput() { optimized = false; clearHL(); draw(); }
function clearHL() { document.querySelectorAll('.stat-box').forEach(b => b.classList.remove('highlight')); }
function onSlider() { sliderVal = document.getElementById('obj-slider').value / 1000; draw(); }

function showObjLine() {
  objActive = true;
  document.getElementById('obj-slider').disabled = false;
  document.getElementById('btn-opt').classList.add('show');
  draw();
}

function optimize() {
  const m = getModel();
  bestPt = corners.reduce((prev, curr) => (goal === 'max' ? zVal(m, curr) > zVal(m, prev) : zVal(m, curr) < zVal(m, prev)) ? curr : prev, corners[0]);
  optimized = true;
  document.querySelectorAll('.stat-box').forEach(b => b.classList.add('highlight'));
  draw();
}

window.onload = () => { rebuildConstraints(); resizeCanvas(); };
</script>
</body>
</html>
