<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear Programming Explorer — Light Academic</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f5f0e8;
    --surface: #fdfaf4;
    --surface2:#f0ebe0;
    --border:  #d6cdb8;
    --border2: #c2b89e;
    --accent:  #1a3a6b;
    --accent2: #17a34a;
    --accent3: #b83232;
    --obj:     #9c5c00;
    --text:    #1e1a14;
    --text2:   #5a5040;
    --text3:   #a09070;
    --c1:      #1a3a6b;
    --c2:      #b83232;
    --c3:      #7c3aed;
    --c4:      #b45309;
    --glow:    0 2px 12px rgba(26,58,107,0.2);
    --glow2:   0 2px 12px rgba(23,163,74,0.25);
    --shadow:  0 1px 4px rgba(30,26,20,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; }

  header {
    background: var(--accent); border-bottom: 3px solid #0f2347;
    padding: 11px 24px; display: flex; align-items: baseline; gap: 14px;
  }
  header h1 { font-family: 'Lora', serif; font-size: 1.3rem; color: #f5f0e8; letter-spacing: -.3px; }
  header span { font-family: 'IBM Plex Mono', monospace; font-size: .68rem; color: rgba(245,240,232,.5); border: 1px solid rgba(245,240,232,.22); padding: 2px 8px; border-radius: 3px; }

  /* ── LAYOUT: left ~60%, plot ~40% ── */
  .main-layout { display: grid; grid-template-columns: 60% 40%; height: calc(100vh - 49px); }

  /* ── LEFT PANEL ── */
  .left-panel {
    background: var(--surface); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 14px 18px;
    display: flex; flex-direction: column; gap: 11px;
    box-shadow: 2px 0 8px rgba(30,26,20,.07);
  }

  .section-label {
    font-size: .6rem; font-weight: 600; letter-spacing: .14em; color: var(--text3);
    text-transform: uppercase; margin-bottom: 7px; padding-bottom: 5px; border-bottom: 1px solid var(--border);
  }

  .card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 11px 13px; box-shadow: var(--shadow); }

  .top-controls { display: flex; gap: 10px; align-items: flex-start; }
  .top-controls .card { flex: 1; }

  .obj-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
  .obj-label { font-family: 'IBM Plex Mono', monospace; font-size: .86rem; color: var(--text2); }
  .toggle-btn { display: flex; border: 1.5px solid var(--border2); border-radius: 5px; overflow: hidden; }
  .toggle-btn button { background: none; border: none; color: var(--text2); font-family: 'Source Sans 3', sans-serif; font-size: .78rem; font-weight: 500; padding: 4px 12px; cursor: pointer; transition: background .15s, color .15s; }
  .toggle-btn button.active { background: var(--accent); color: #f5f0e8; }

  .coeff-row { display: flex; align-items: center; gap: 5px; margin-top: 7px; flex-wrap: wrap; }
  .coeff-row label { font-family: 'IBM Plex Mono', monospace; font-size: .8rem; color: var(--text2); }

  .num-input {
    width: 62px; background: var(--surface); border: 1.5px solid var(--border2);
    border-radius: 4px; color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: .84rem; padding: 4px 6px; text-align: center; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .num-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(26,58,107,.12); }

  .nc-row { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
  .nc-row label { font-family: 'IBM Plex Mono', monospace; font-size: .8rem; color: var(--text2); }
  .nc-sel { background: var(--surface); border: 1.5px solid var(--border2); border-radius: 4px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: .84rem; padding: 3px 7px; outline: none; cursor: pointer; }

  .gw-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-top: 8px; }
  .gw-row label { font-family: 'IBM Plex Mono', monospace; font-size: .78rem; color: var(--text2); white-space: nowrap; }
  .gw-row .num-input { width: 60px; }

  .constraint-block { margin-top: 6px; display: flex; flex-direction: column; gap: 8px; }
  .constraint-row { display: flex; align-items: center; gap: 5px; flex-wrap: nowrap; white-space: nowrap; }
  .constraint-row .c-label { font-family: 'IBM Plex Mono', monospace; font-size: .76rem; color: var(--text2); font-weight: 600; min-width: 26px; flex-shrink: 0; }
  .constraint-row .num-input { width: 60px; flex-shrink: 0; }
  .constraint-row label { font-family: 'IBM Plex Mono', monospace; font-size: .78rem; color: var(--text2); flex-shrink: 0; }
  .sign-sel { background: var(--surface); border: 1.5px solid var(--border2); border-radius: 4px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: .78rem; padding: 3px 4px; outline: none; cursor: pointer; flex-shrink: 0; }

  .c-color-0 { border-left: 3px solid var(--c1); padding-left: 7px; }
  .c-color-1 { border-left: 3px solid var(--c2); padding-left: 7px; }
  .c-color-2 { border-left: 3px solid var(--c3); padding-left: 7px; }
  .c-color-3 { border-left: 3px solid var(--c4); padding-left: 7px; }

  .nn-note { font-family: 'IBM Plex Mono', monospace; font-size: .72rem; color: var(--text3); margin-top: 5px; display: flex; align-items: center; gap: 7px; transition: color .25s; user-select: none; cursor: pointer; }
  .nn-note.active { color: var(--text2); }
  .nn-checkbox { appearance: none; -webkit-appearance: none; width: 14px; height: 14px; border: 1.5px solid var(--text3); border-radius: 3px; background: var(--surface); cursor: pointer; flex-shrink: 0; position: relative; transition: border-color .2s, background .2s; }
  .nn-checkbox:checked { background: var(--accent2); border-color: var(--accent2); }
  .nn-checkbox:checked::after { content: ''; position: absolute; left: 2px; top: -1px; width: 4px; height: 8px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg); }

  .formula-display { margin-top: 7px; font-family: 'IBM Plex Mono', monospace; font-size: .78rem; color: var(--text2); line-height: 1.8; padding: 9px 11px; background: var(--surface); border-radius: 5px; border: 1px solid var(--border); }
  .formula-display .f-obj { color: var(--obj); font-weight: 600; }
  .formula-display .f-c0 { color: var(--c1); }
  .formula-display .f-c1 { color: var(--c2); }
  .formula-display .f-c2 { color: var(--c3); }
  .formula-display .f-c3 { color: var(--c4); }
  .formula-display .f-nn { color: var(--text3); }

  .btn-clear { background: none; border: 1.5px solid var(--border2); color: var(--text2); font-family: 'Source Sans 3', sans-serif; font-size: .78rem; font-weight: 600; padding: 5px 12px; border-radius: 5px; cursor: pointer; white-space: nowrap; transition: background .15s, border-color .15s, color .15s; margin-top: 8px; }
  .btn-clear:hover { background: #fde8e8; border-color: var(--accent3); color: var(--accent3); }

  /* ── RIGHT PANEL ── */
  .right-panel { display: flex; flex-direction: column; }
  .graph-area { flex: 1; position: relative; background: #fdfaf4; overflow: hidden; }
  canvas#lp-canvas { display: block; width: 100%; height: 100%; }

  /* ── BOTTOM STRIP ── */
  .bottom-strip { background: var(--surface); border-top: 1px solid var(--border); padding: 9px 14px; display: flex; align-items: center; gap: 9px; flex-wrap: wrap; box-shadow: 0 -2px 8px rgba(30,26,20,.06); }

  .stat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; min-width: 100px; box-shadow: var(--shadow); transition: box-shadow .4s, border-color .4s; }
  .stat-box .sb-label { font-size: .56rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 2px; }
  .stat-box .sb-val { font-family: 'IBM Plex Mono', monospace; font-size: .9rem; color: var(--accent2); font-weight: 600; }
  .stat-box.highlight { border-color: var(--accent2); animation: glowPulse 1s ease-in-out infinite alternate; }
  @keyframes glowPulse { from { box-shadow: 0 0 0 2px rgba(23,163,74,.1); } to { box-shadow: 0 0 0 3px rgba(23,163,74,.35), 0 4px 18px rgba(23,163,74,.3); } }

  /* slider with +/- nudge buttons */
  .obj-slider-wrap { flex: 1; min-width: 150px; display: flex; flex-direction: column; gap: 4px; }
  .obj-slider-wrap > label { font-size: .65rem; color: var(--text2); white-space: nowrap; font-weight: 500; }
  .slider-with-btns { display: flex; align-items: center; gap: 4px; }
  .slider-nudge { background: var(--surface2); border: 1.5px solid var(--border2); color: var(--text2); font-family: 'IBM Plex Mono', monospace; font-size: 1rem; font-weight: 700; width: 26px; height: 26px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s; padding: 0; line-height: 1; }
  .slider-nudge:hover:not(:disabled) { background: var(--border); }
  .slider-nudge:disabled { opacity: .35; cursor: not-allowed; }

  input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: var(--border2); border-radius: 4px; outline: none; cursor: pointer; flex: 1; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--obj); border-radius: 50%; cursor: pointer; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(156,92,0,.4); }
  input[type=range]:disabled { opacity: .4; cursor: not-allowed; }

  .btn-generate { background: var(--accent); border: none; color: #f5f0e8; font-family: 'Source Sans 3', sans-serif; font-size: .78rem; font-weight: 600; padding: 6px 13px; border-radius: 5px; cursor: pointer; white-space: nowrap; transition: background .2s, box-shadow .2s; }
  .btn-generate:hover { background: #0f2347; box-shadow: var(--glow); }
  .btn-optimize { background: var(--accent2); border: none; color: #fff; font-family: 'Source Sans 3', sans-serif; font-size: .78rem; font-weight: 600; padding: 6px 13px; border-radius: 5px; cursor: pointer; white-space: nowrap; transition: background .2s, box-shadow .2s; display: none; }
  .btn-optimize:hover { background: #15803d; box-shadow: var(--glow2); }
  .btn-optimize.visible { display: inline-block; }

  .corner-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; min-width: 140px; box-shadow: var(--shadow); }
  .corner-box .sb-label { font-size: .56rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
  .corner-list { display: flex; flex-direction: column; gap: 2px; }
  .corner-item { font-family: 'IBM Plex Mono', monospace; font-size: .64rem; color: var(--text2); padding: 1px 0; }
  .corner-item.best { color: var(--accent2); font-weight: 600; }

  /* Legend */
  .legend { position: absolute; top: 12px; right: 12px; background: rgba(253,250,244,.93); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; font-size: .67rem; display: flex; flex-direction: column; gap: 6px; box-shadow: var(--shadow); backdrop-filter: blur(4px); }
  .legend-item { display: flex; align-items: center; gap: 8px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; }
  .legend-line { width: 22px; height: 3px; border-radius: 2px; flex-shrink: 0; }
  /* Feasible region shown as small filled rectangle */
  .legend-swatch { width: 22px; height: 13px; border-radius: 3px; flex-shrink: 0; background: rgba(34,197,94,.35); border: 1.5px solid rgba(23,163,74,.6); }

  .canvas-tip { position: absolute; background: rgba(253,250,244,.97); border: 1px solid var(--border2); border-radius: 5px; padding: 5px 9px; font-family: 'IBM Plex Mono', monospace; font-size: .67rem; color: var(--text); pointer-events: none; display: none; box-shadow: var(--shadow); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>Linear Programming Explorer</h1>
  <span>2-Variable Interactive Model</span>
</header>

<div class="main-layout">

  <!-- ═══ LEFT PANEL ═══ -->
  <div class="left-panel">

    <!-- Row: Objective + Settings -->
    <div class="top-controls">

      <div class="card" style="flex:1.5">
        <div class="section-label">Objective Function</div>
        <div class="obj-row">
          <div class="toggle-btn">
            <button id="btn-max" class="active" onclick="setGoal('max')">Maximize</button>
            <button id="btn-min" onclick="setGoal('min')">Minimize</button>
          </div>
          <span class="obj-label">Z =</span>
        </div>
        <div class="coeff-row">
          <input type="number" class="num-input" id="c1" placeholder="0" oninput="updateModel()">
          <label>x₁  +</label>
          <input type="number" class="num-input" id="c2" placeholder="0" oninput="updateModel()">
          <label>x₂</label>
        </div>
      </div>

      <div class="card" style="flex:1">
        <div class="section-label">Settings</div>
        <div class="nc-row">
          <label># Constraints:</label>
          <select class="nc-sel" id="nc-sel" onchange="rebuildConstraints()">
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </div>
        <div class="gw-row">
          <label>x max:</label>
          <input type="number" class="num-input" id="xmax" value="8" oninput="updateModel()" style="width:58px">
          <label>y max:</label>
          <input type="number" class="num-input" id="ymax" value="8" oninput="updateModel()" style="width:58px">
        </div>
        <button class="btn-clear" onclick="clearAll()">✕ Clear All</button>
      </div>

    </div>

    <!-- Functional Constraints -->
    <div class="card">
      <div class="section-label">Functional Constraints</div>
      <div class="constraint-block" id="constraint-block"></div>
      <label class="nn-note active" id="nn-label" onclick="toggleNN()">
        <input type="checkbox" class="nn-checkbox" id="nn-check" checked onchange="toggleNN()">
        x₁, x₂ ≥ 0 &nbsp;(non-negativity constraints)
      </label>
    </div>

    <!-- Model Summary -->
    <div class="card">
      <div class="section-label">Model Summary</div>
      <div class="formula-display" id="formula-display"></div>
    </div>

  </div>

  <!-- ═══ RIGHT PANEL ═══ -->
  <div class="right-panel">
    <div class="graph-area">
      <canvas id="lp-canvas"></canvas>
      <div class="legend" id="legend-box"></div>
      <div class="canvas-tip" id="canvas-tip"></div>
    </div>

    <div class="bottom-strip">
      <div class="stat-box" id="box-x1"><div class="sb-label">x₁ value</div><div class="sb-val" id="val-x1">—</div></div>
      <div class="stat-box" id="box-x2"><div class="sb-label">x₂ value</div><div class="sb-val" id="val-x2">—</div></div>
      <div class="stat-box" id="box-r1"><div class="sb-label">Resource 1 used</div><div class="sb-val" id="val-r1">—</div></div>
      <div class="stat-box" id="box-r2"><div class="sb-label">Resource 2 used</div><div class="sb-val" id="val-r2">—</div></div>
      <div class="stat-box" id="box-z"><div class="sb-label">Objective Z</div><div class="sb-val" id="val-z" style="color:var(--obj)">—</div></div>

      <div class="corner-box">
        <div class="sb-label">Corner Points</div>
        <div class="corner-list" id="corner-list"></div>
      </div>

      <div style="display:flex;flex-direction:column;gap:6px;min-width:170px;flex:1">
        <div class="obj-slider-wrap">
          <label>Slide Z-line:</label>
          <div class="slider-with-btns">
            <button class="slider-nudge" id="nudge-minus" onclick="nudgeSlider(-1)" disabled>−</button>
            <input type="range" id="obj-slider" min="0" max="100" value="30" oninput="onSlider()" disabled>
            <button class="slider-nudge" id="nudge-plus" onclick="nudgeSlider(1)" disabled>+</button>
          </div>
        </div>
        <div style="display:flex;gap:7px;">
          <button class="btn-generate" onclick="generateObjLine()">Show Objective Line</button>
          <button class="btn-optimize" id="btn-optimize" onclick="optimize()">⬡ Optimize</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ── Constants ──────────────────────────────
const C_COLORS = ['#1a3a6b','#b83232','#7c3aed','#b45309'];
const C_NAMES  = ['C₁','C₂','C₃','C₄'];

// ── State ──────────────────────────────────
let model = {
  goal: 'max', c: [null,null], numC: 2,
  a: [[null,null],[null,null],[null,null],[null,null]],
  b: [null,null,null,null], signs: ['le','le','le','le'],
  xmax: 8, ymax: 8,
};
let objLineActive=false, objSliderVal=0.3, optimized=false, cornerPoints=[], bestCorner=null;

// ── Canvas ─────────────────────────────────
const canvas=document.getElementById('lp-canvas'), ctx=canvas.getContext('2d');
function resizeCanvas(){
  const r=canvas.parentElement.getBoundingClientRect();
  canvas.width=r.width*devicePixelRatio; canvas.height=r.height*devicePixelRatio;
  canvas.style.width=r.width+'px'; canvas.style.height=r.height+'px';
  ctx.scale(devicePixelRatio,devicePixelRatio); draw();
}
window.addEventListener('resize',resizeCanvas);

// ── Build constraint rows ──────────────────
function rebuildConstraints(){
  model.numC=+document.getElementById('nc-sel').value;
  const block=document.getElementById('constraint-block');
  block.innerHTML='';
  for(let i=0;i<model.numC;i++){
    const row=document.createElement('div');
    row.className=`constraint-row c-color-${i}`;
    row.innerHTML=`
      <span class="c-label">${C_NAMES[i]}:</span>
      <input type="number" class="num-input" id="a${i}1" placeholder="0" oninput="updateModel()">
      <label>x₁ +</label>
      <input type="number" class="num-input" id="a${i}2" placeholder="0" oninput="updateModel()">
      <label>x₂</label>
      <select class="sign-sel" id="s${i}" onchange="updateModel()">
        <option value="le">≤</option><option value="ge">≥</option><option value="eq">=</option>
      </select>
      <input type="number" class="num-input" id="b${i}" placeholder="0" oninput="updateModel()">
    `;
    block.appendChild(row);
    if(model.signs[i]){const sel=document.getElementById(`s${i}`);if(sel)sel.value=model.signs[i];}
  }
  updateLegend(); updateModel();
}

function updateLegend(){
  const box=document.getElementById('legend-box');
  let html='';
  for(let i=0;i<model.numC;i++){
    html+=`<div class="legend-item"><div class="legend-line" style="background:${C_COLORS[i]}"></div><span>Constraint ${i+1}</span></div>`;
  }
  html+=`<div class="legend-item"><div class="legend-line" style="background:var(--obj)"></div><span>Objective Fn.</span></div>`;
  html+=`<div class="legend-item"><div class="legend-swatch"></div><span>Feasible Region</span></div>`;
  box.innerHTML=html;
}

// ── Parse ──────────────────────────────────
function parseModel(){
  model.goal=document.getElementById('btn-max').classList.contains('active')?'max':'min';
  model.c=[parseFloat(document.getElementById('c1').value), parseFloat(document.getElementById('c2').value)];
  model.numC=+document.getElementById('nc-sel').value;
  for(let i=0;i<model.numC;i++){
    model.a[i]=[parseFloat(document.getElementById(`a${i}1`)?.value), parseFloat(document.getElementById(`a${i}2`)?.value)];
    model.b[i]=parseFloat(document.getElementById(`b${i}`)?.value);
    model.signs[i]=document.getElementById(`s${i}`)?.value||'le';
  }
  model.xmax=Math.max(1,parseFloat(document.getElementById('xmax').value)||8);
  model.ymax=Math.max(1,parseFloat(document.getElementById('ymax').value)||8);
}

// ── Feasibility ────────────────────────────
function cActive(i){return!isNaN(model.a[i][0])&&!isNaN(model.a[i][1])&&!isNaN(model.b[i]);}

function isFeasible(x,y){
  const nn=document.getElementById('nn-check').checked;
  if(nn&&(x<-1e-9||y<-1e-9))return false;
  for(let i=0;i<model.numC;i++){
    if(!cActive(i))continue;
    const lhs=model.a[i][0]*x+model.a[i][1]*y, rhs=model.b[i];
    if(model.signs[i]==='le'&&lhs>rhs+1e-9)return false;
    if(model.signs[i]==='ge'&&lhs<rhs-1e-9)return false;
    if(model.signs[i]==='eq'&&Math.abs(lhs-rhs)>1e-9)return false;
  }
  return true;
}

// ── Math ───────────────────────────────────
function intersect2(i,j){
  const[a,b]=model.a[i],[c,d]=model.a[j],e=model.b[i],f=model.b[j];
  const det=a*d-b*c; if(Math.abs(det)<1e-12)return null;
  return[(e*d-b*f)/det,(a*f-e*c)/det];
}

function computeCorners(){
  const cands=[[0,0]];
  const active=[];
  for(let i=0;i<model.numC;i++)if(cActive(i))active.push(i);
  for(const i of active){
    const[a,b]=model.a[i],rhs=model.b[i];
    if(Math.abs(a)>1e-9)cands.push([rhs/a,0]);
    if(Math.abs(b)>1e-9)cands.push([0,rhs/b]);
    if(Math.abs(a)>1e-9)cands.push([(rhs-b*model.ymax)/a,model.ymax]);
    if(Math.abs(b)>1e-9)cands.push([model.xmax,(rhs-a*model.xmax)/b]);
  }
  for(let ii=0;ii<active.length;ii++)
    for(let jj=ii+1;jj<active.length;jj++){const p=intersect2(active[ii],active[jj]);if(p)cands.push(p);}
  const nn=document.getElementById('nn-check').checked;
  return cands
    .map(([x,y])=>nn?[Math.max(0,x),Math.max(0,y)]:[x,y])
    .filter(([x,y])=>isFeasible(x,y))
    .filter(([x,y])=>x<=model.xmax*1.5&&y<=model.ymax*1.5);
}

function objVal(p){const c1=isNaN(model.c[0])?0:model.c[0],c2=isNaN(model.c[1])?0:model.c[1];return c1*p[0]+c2*p[1];}

function findOptimal(){
  cornerPoints=computeCorners(); if(!cornerPoints.length)return null;
  let best=cornerPoints[0];
  for(const p of cornerPoints){const v=objVal(p),bv=objVal(best);if(model.goal==='max'?v>bv:v<bv)best=p;}
  return best;
}

// ── Coordinate mapping ─────────────────────
const PAD={l:50,r:16,t:16,b:40};
function W(){return canvas.width/devicePixelRatio;}
function H(){return canvas.height/devicePixelRatio;}
function tx(x){return PAD.l+x/model.xmax*(W()-PAD.l-PAD.r);}
function ty(y){return H()-PAD.b-y/model.ymax*(H()-PAD.t-PAD.b);}
function fromCanvas(cx,cy){return[(cx-PAD.l)/(W()-PAD.l-PAD.r)*model.xmax,(H()-PAD.b-cy)/(H()-PAD.t-PAD.b)*model.ymax];}

// ── Draw ───────────────────────────────────
function draw(){
  const w=W(),h=H();
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#fdfaf4'; ctx.fillRect(0,0,w,h);
  drawGrid(w,h); drawFeasibleRegion(); drawConstraints();
  if(objLineActive)drawObjectiveLine();
  drawCornerDots(); drawAxes(w,h);
  updateStats(); updateFormula(); updateCornerList();
}

function drawGrid(w,h){
  ctx.strokeStyle='rgba(214,205,184,.6)'; ctx.lineWidth=1;
  for(let i=0;i<=Math.ceil(model.xmax);i++){ctx.beginPath();ctx.moveTo(tx(i),PAD.t);ctx.lineTo(tx(i),h-PAD.b);ctx.stroke();}
  for(let j=0;j<=Math.ceil(model.ymax);j++){ctx.beginPath();ctx.moveTo(PAD.l,ty(j));ctx.lineTo(w-PAD.r,ty(j));ctx.stroke();}
}

function drawAxes(w,h){
  ctx.strokeStyle='rgba(30,26,20,.4)'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,h-PAD.b);ctx.moveTo(PAD.l,h-PAD.b);ctx.lineTo(w-PAD.r,h-PAD.b);ctx.stroke();
  ctx.fillStyle='rgba(90,80,64,.65)'; ctx.font='11px IBM Plex Mono,monospace';
  ctx.textAlign='center';
  for(let i=0;i<=Math.ceil(model.xmax);i++)ctx.fillText(i,tx(i),h-PAD.b+14);
  ctx.textAlign='right';
  for(let j=0;j<=Math.ceil(model.ymax);j++)ctx.fillText(j,PAD.l-5,ty(j)+4);
  ctx.fillStyle='rgba(30,26,20,.5)'; ctx.font='600 11px IBM Plex Mono,monospace';
  ctx.textAlign='center'; ctx.fillText('x₁',tx(model.xmax/2),h-PAD.b+29);
  ctx.save();ctx.translate(12,ty(model.ymax/2));ctx.rotate(-Math.PI/2);ctx.fillText('x₂',0,0);ctx.restore();
}

function linePoints(i){
  const[a,b]=model.a[i],rhs=model.b[i];let pts=[];
  if(Math.abs(a)>1e-9){pts.push([rhs/a,0]);pts.push([(rhs-b*model.ymax)/a,model.ymax]);}
  if(Math.abs(b)>1e-9){pts.push([0,rhs/b]);pts.push([model.xmax,(rhs-a*model.xmax)/b]);}
  pts=pts.filter(([x,y])=>x>=-.5&&x<=model.xmax+.5&&y>=-.5&&y<=model.ymax+.5);
  return pts.length<2?null:[pts[0],pts[pts.length-1]];
}

function drawConstraints(){
  for(let i=0;i<model.numC;i++){
    if(!cActive(i))continue;
    const pts=linePoints(i); if(!pts)continue;
    ctx.beginPath();ctx.moveTo(tx(pts[0][0]),ty(pts[0][1]));ctx.lineTo(tx(pts[1][0]),ty(pts[1][1]));
    ctx.strokeStyle=C_COLORS[i]; ctx.lineWidth=2.5; ctx.setLineDash([]); ctx.stroke();
    const mx=(pts[0][0]+pts[1][0])/2,my=(pts[0][1]+pts[1][1])/2;
    ctx.font='600 11px IBM Plex Mono,monospace'; ctx.fillStyle=C_COLORS[i]; ctx.textAlign='left';
    ctx.fillText(C_NAMES[i],tx(mx)+6,ty(my)-5);
  }
}

function drawFeasibleRegion(){
  const w=W(),h=H(),imgW=Math.floor(w-PAD.l-PAD.r),imgH=Math.floor(h-PAD.t-PAD.b);
  if(imgW<=0||imgH<=0)return;
  const off=document.createElement('canvas');off.width=imgW;off.height=imgH;
  const oc=off.getContext('2d'),id=oc.createImageData(imgW,imgH);
  for(let px=0;px<imgW;px++)for(let py=0;py<imgH;py++){
    const x=(px/imgW)*model.xmax,y=((imgH-1-py)/imgH)*model.ymax;
    if(isFeasible(x,y)){const idx=(py*imgW+px)*4;id.data[idx]=34;id.data[idx+1]=197;id.data[idx+2]=94;id.data[idx+3]=60;}
  }
  oc.putImageData(id,0,0); ctx.drawImage(off,PAD.l,PAD.t,imgW,imgH);
  const corners=computeCorners().filter(([x,y])=>x>=0&&y>=0);
  if(corners.length>=3){
    const cx=corners.reduce((s,p)=>s+p[0],0)/corners.length,cy=corners.reduce((s,p)=>s+p[1],0)/corners.length;
    corners.sort((a,b)=>Math.atan2(a[1]-cy,a[0]-cx)-Math.atan2(b[1]-cy,b[0]-cx));
    ctx.beginPath();ctx.moveTo(tx(corners[0][0]),ty(corners[0][1]));
    for(let i=1;i<corners.length;i++)ctx.lineTo(tx(corners[i][0]),ty(corners[i][1]));
    ctx.closePath();ctx.strokeStyle='rgba(23,163,74,.7)';ctx.setLineDash([5,4]);ctx.lineWidth=1.5;ctx.stroke();ctx.setLineDash([]);
  }
}

function drawObjectiveLine(){
  const c1=isNaN(model.c[0])?0:model.c[0],c2=isNaN(model.c[1])?0:model.c[1];
  if(Math.abs(c1)<1e-9&&Math.abs(c2)<1e-9)return;
  const allZ=cornerPoints.map(p=>objVal(p)); if(!allZ.length)return;
  let zMin=Math.min(...allZ)*(model.goal==='max'?.05:1.5),zMax=Math.max(...allZ)*(model.goal==='max'?1.5:.05);
  if(zMin>zMax)[zMin,zMax]=[zMax,zMin];
  const zr=zMax-zMin||1; zMin-=zr*.1; zMax+=zr*.1;
  const Z=zMin+objSliderVal*(zMax-zMin);
  let pts=[];
  if(Math.abs(c2)>1e-9){pts.push([0,Z/c2]);pts.push([model.xmax,(Z-c1*model.xmax)/c2]);if(Math.abs(c1)>1e-9){pts.push([Z/c1,0]);pts.push([(Z-c2*model.ymax)/c1,model.ymax]);}}
  else if(Math.abs(c1)>1e-9){pts.push([Z/c1,0]);pts.push([Z/c1,model.ymax]);}
  pts=pts.filter(([x,y])=>x>=-.01&&x<=model.xmax+.01&&y>=-.01&&y<=model.ymax+.01);
  if(pts.length<2)return;
  ctx.beginPath();ctx.moveTo(tx(pts[0][0]),ty(pts[0][1]));ctx.lineTo(tx(pts[pts.length-1][0]),ty(pts[pts.length-1][1]));
  ctx.strokeStyle='#9c5c00';ctx.lineWidth=2.5;ctx.setLineDash([9,5]);ctx.stroke();ctx.setLineDash([]);
  const mx=(pts[0][0]+pts[pts.length-1][0])/2,my=(pts[0][1]+pts[pts.length-1][1])/2;
  ctx.font='600 11px IBM Plex Mono,monospace';ctx.fillStyle='#9c5c00';ctx.textAlign='left';
  ctx.fillText(`Z = ${Z.toFixed(1)}`,tx(mx)+6,ty(my)-7);
  updateSliderStats(Z);
}

function updateSliderStats(Z){
  document.getElementById('val-z').textContent=Z.toFixed(2);
  ['val-x1','val-x2','val-r1','val-r2'].forEach(id=>document.getElementById(id).textContent='—');
}

function drawCornerDots(){
  cornerPoints=computeCorners(); bestCorner=findOptimal();
  for(const p of cornerPoints){
    const isBest=bestCorner&&Math.abs(p[0]-bestCorner[0])<1e-6&&Math.abs(p[1]-bestCorner[1])<1e-6&&optimized;
    ctx.beginPath();ctx.arc(tx(p[0]),ty(p[1]),isBest?7:4.5,0,Math.PI*2);
    ctx.fillStyle=isBest?'#17a34a':'rgba(30,26,20,.55)';
    if(isBest){ctx.shadowColor='#17a34a';ctx.shadowBlur=14;}
    ctx.fill();ctx.shadowBlur=0;
    if(isBest){ctx.beginPath();ctx.arc(tx(p[0]),ty(p[1]),7,0,Math.PI*2);ctx.strokeStyle='rgba(23,163,74,.4)';ctx.lineWidth=3;ctx.stroke();}
    ctx.font='10px IBM Plex Mono,monospace';ctx.fillStyle=isBest?'#15803d':'rgba(90,80,64,.7)';ctx.textAlign='left';
    ctx.fillText(`(${p[0].toFixed(1)}, ${p[1].toFixed(1)})`,tx(p[0])+9,ty(p[1])-6);
  }
}

// ── UI Updates ─────────────────────────────
function updateStats(){
  if(!optimized||!bestCorner)return;
  const[x1,x2]=bestCorner;
  const r1=cActive(0)?model.a[0][0]*x1+model.a[0][1]*x2:null;
  const r2=cActive(1)?model.a[1][0]*x1+model.a[1][1]*x2:null;
  document.getElementById('val-x1').textContent=x1.toFixed(3);
  document.getElementById('val-x2').textContent=x2.toFixed(3);
  document.getElementById('val-r1').textContent=r1!==null?`${r1.toFixed(2)} / ${model.b[0]}`:'—';
  document.getElementById('val-r2').textContent=r2!==null?`${r2.toFixed(2)} / ${model.b[1]}`:'—';
  document.getElementById('val-z').textContent=objVal(bestCorner).toFixed(3);
}

function updateFormula(){
  const c1=isNaN(model.c[0])?'?':model.c[0],c2=isNaN(model.c[1])?'?':model.c[1];
  const goal=model.goal==='max'?'Maximize':'Minimize';
  const rowStr=i=>{
    const[a,b]=model.a[i],rhs=model.b[i];
    const sign=['≤','≥','='][['le','ge','eq'].indexOf(model.signs[i])];
    return`${isNaN(a)?'?':a} x₁ + ${isNaN(b)?'?':b} x₂ ${sign} ${isNaN(rhs)?'?':rhs}`;
  };
  let html=`<span class="f-obj">${goal} Z = ${c1} x₁ + ${c2} x₂</span><br>Subject to:`;
  for(let i=0;i<model.numC;i++)html+=`<br><span class="f-c${i}">&nbsp;&nbsp;${rowStr(i)}</span>`;
  const nnOn=document.getElementById('nn-check').checked;
  html+=`<br><span class="f-nn">&nbsp;&nbsp;x₁, x₂ ≥ 0${nnOn?'':' <em>(not enforced)</em>'}</span>`;
  document.getElementById('formula-display').innerHTML=html;
}

function updateCornerList(){
  cornerPoints=computeCorners(); bestCorner=findOptimal();
  const list=document.getElementById('corner-list');
  if(!cornerPoints.length){list.innerHTML='<div class="corner-item" style="color:var(--accent3)">No feasible region</div>';return;}
  list.innerHTML=cornerPoints.map(p=>{
    const z=objVal(p),isBest=bestCorner&&Math.abs(p[0]-bestCorner[0])<1e-6&&Math.abs(p[1]-bestCorner[1])<1e-6;
    return`<div class="corner-item${isBest&&optimized?' best':''}">(${p[0].toFixed(2)}, ${p[1].toFixed(2)}) → Z=${z.toFixed(2)}${isBest&&optimized?' ★':''}</div>`;
  }).join('');
}

// ── Interactions ───────────────────────────
function toggleNN(){const cb=document.getElementById('nn-check');document.getElementById('nn-label').classList.toggle('active',cb.checked);optimized=false;clearHighlights();draw();}
function setGoal(g){model.goal=g;document.getElementById('btn-max').classList.toggle('active',g==='max');document.getElementById('btn-min').classList.toggle('active',g==='min');optimized=false;clearHighlights();draw();}
function updateModel(){parseModel();optimized=false;clearHighlights();draw();}

function clearAll(){
  document.getElementById('c1').value=''; document.getElementById('c2').value='';
  for(let i=0;i<4;i++){
    const a1=document.getElementById(`a${i}1`),a2=document.getElementById(`a${i}2`),bi=document.getElementById(`b${i}`),si=document.getElementById(`s${i}`);
    if(a1)a1.value=''; if(a2)a2.value=''; if(bi)bi.value=''; if(si)si.value='le';
  }
  document.getElementById('xmax').value=8; document.getElementById('ymax').value=8;
  const sl=document.getElementById('obj-slider'); sl.value=30; sl.disabled=true;
  document.getElementById('nudge-minus').disabled=true;
  document.getElementById('nudge-plus').disabled=true;
  document.getElementById('btn-optimize').classList.remove('visible');
  objLineActive=false; objSliderVal=0.3; optimized=false;
  clearHighlights(); updateModel();
}

function generateObjLine(){
  parseModel(); cornerPoints=computeCorners(); if(!cornerPoints.length)return;
  objLineActive=true; optimized=false; clearHighlights();
  const sl=document.getElementById('obj-slider'); sl.disabled=false;
  sl.value=model.goal==='max'?25:75; objSliderVal=+sl.value/100;
  document.getElementById('nudge-minus').disabled=false;
  document.getElementById('nudge-plus').disabled=false;
  document.getElementById('btn-optimize').classList.add('visible'); draw();
}

function onSlider(){optimized=false;clearHighlights();objSliderVal=+document.getElementById('obj-slider').value/100;draw();}

function nudgeSlider(dir){
  const sl=document.getElementById('obj-slider'); if(sl.disabled)return;
  const v=Math.min(100,Math.max(0,+sl.value+dir*2));
  sl.value=v; objSliderVal=v/100; optimized=false; clearHighlights(); draw();
}

function optimize(){
  parseModel(); cornerPoints=computeCorners(); bestCorner=findOptimal(); if(!bestCorner)return;
  const allZ=cornerPoints.map(p=>objVal(p));
  let zMin=Math.min(...allZ)*(model.goal==='max'?.05:1.5),zMax=Math.max(...allZ)*(model.goal==='max'?1.5:.05);
  if(zMin>zMax)[zMin,zMax]=[zMax,zMin];
  const zr=zMax-zMin||1; zMin-=zr*.1; zMax+=zr*.1;
  const optZ=objVal(bestCorner),targetSlider=(optZ-zMin)/(zMax-zMin)*100,startSlider=+document.getElementById('obj-slider').value;
  const dur=900,start=performance.now();
  function anim(now){
    const t=Math.min((now-start)/dur,1),ease=t<.5?2*t*t:-1+(4-2*t)*t,val=startSlider+(targetSlider-startSlider)*ease;
    document.getElementById('obj-slider').value=val; objSliderVal=val/100; draw();
    if(t<1)requestAnimationFrame(anim);
    else{objSliderVal=targetSlider/100;optimized=true;draw();['box-x1','box-x2','box-r1','box-r2','box-z'].forEach(id=>document.getElementById(id).classList.add('highlight'));}
  }
  requestAnimationFrame(anim);
}

function clearHighlights(){['box-x1','box-x2','box-r1','box-r2','box-z'].forEach(id=>document.getElementById(id).classList.remove('highlight'));}

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect(),[x,y]=fromCanvas(e.clientX-r.left,e.clientY-r.top);
  if(x<0||y<0||x>model.xmax||y>model.ymax){document.getElementById('canvas-tip').style.display='none';return;}
  const f=isFeasible(x,y),z=objVal([x,y]),tip=document.getElementById('canvas-tip');
  tip.style.display='block';tip.style.left=(e.clientX-r.left+14)+'px';tip.style.top=(e.clientY-r.top-10)+'px';
  tip.innerHTML=`x₁=${x.toFixed(2)}, x₂=${y.toFixed(2)}<br>Z=${z.toFixed(2)} · ${f?'<span style="color:#17a34a">✓ feasible</span>':'<span style="color:#b83232">✗ infeasible</span>'}`;
});
canvas.addEventListener('mouseleave',()=>document.getElementById('canvas-tip').style.display='none');

// ── Init ───────────────────────────────────
rebuildConstraints();
resizeCanvas();
draw();
</script>
</body>
</html>
