<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear Programming Explorer — Light Academic</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f5f0e8;
    --surface:  #fdfaf4;
    --surface2: #f0ebe0;
    --border:   #d6cdb8;
    --border2:  #c2b89e;
    --accent:   #1a3a6b;   /* deep navy */
    --accent2:  #2e7d4f;   /* forest green */
    --accent3:  #b83232;   /* crimson */
    --obj:      #9c5c00;   /* amber/ochre */
    --text:     #1e1a14;
    --text2:    #5a5040;
    --text3:    #a09070;
    --c1:       #1a3a6b;
    --c2:       #b83232;
    --feasible-stroke: rgba(46,125,79,0.8);
    --glow:     0 2px 12px rgba(26,58,107,0.2);
    --glow2:    0 2px 12px rgba(46,125,79,0.25);
    --shadow:   0 1px 4px rgba(30,26,20,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--accent);
    border-bottom: 3px solid #0f2347;
    padding: 16px 36px;
    display: flex;
    align-items: baseline;
    gap: 18px;
  }
  header h1 {
    font-family: 'Lora', serif;
    font-size: 1.5rem;
    letter-spacing: -.3px;
    color: #f5f0e8;
  }
  header span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .74rem;
    color: rgba(245,240,232,.55);
    border: 1px solid rgba(245,240,232,.25);
    padding: 2px 9px;
    border-radius: 3px;
  }

  .main-layout {
    display: grid;
    grid-template-columns: 440px 1fr;
    height: calc(100vh - 59px);
    gap: 0;
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 2px 0 8px rgba(30,26,20,.07);
  }

  .section-label {
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .14em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
  }

  /* Objective */
  .obj-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .obj-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .9rem;
    color: var(--text2);
  }
  .toggle-btn {
    display: flex;
    border: 1.5px solid var(--border2);
    border-radius: 5px;
    overflow: hidden;
  }
  .toggle-btn button {
    background: none;
    border: none;
    color: var(--text2);
    font-family: 'Source Sans 3', sans-serif;
    font-size: .82rem;
    font-weight: 500;
    padding: 5px 14px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .toggle-btn button.active {
    background: var(--accent);
    color: #f5f0e8;
  }

  .coeff-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .coeff-row label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .82rem;
    color: var(--text2);
  }
  .num-input {
    width: 58px;
    background: var(--surface);
    border: 1.5px solid var(--border2);
    border-radius: 4px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: .88rem;
    padding: 5px 7px;
    text-align: center;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .num-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(26,58,107,.12);
  }

  /* Constraints */
  .constraint-block {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .constraint-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
    white-space: nowrap;
  }
  .constraint-row .c-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .78rem;
    color: var(--text2);
    font-weight: 600;
    min-width: 26px;
    flex-shrink: 0;
  }
  .constraint-row .num-input {
    width: 62px;
    flex-shrink: 0;
  }
  .constraint-row label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .82rem;
    color: var(--text2);
    flex-shrink: 0;
  }
  .sign-sel {
    background: var(--surface);
    border: 1.5px solid var(--border2);
    border-radius: 4px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: .82rem;
    padding: 4px 5px;
    outline: none;
    cursor: pointer;
    flex-shrink: 0;
  }
  .c-color-1 { border-left: 3px solid var(--c1); padding-left: 8px; }
  .c-color-2 { border-left: 3px solid var(--c2); padding-left: 8px; }

  /* Non-negativity */
  .nn-note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .75rem;
    color: var(--text3);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color .25s;
    user-select: none;
    cursor: pointer;
  }
  .nn-note.active { color: var(--text2); }

  .nn-checkbox {
    appearance: none;
    -webkit-appearance: none;
    width: 15px;
    height: 15px;
    border: 1.5px solid var(--text3);
    border-radius: 3px;
    background: var(--surface);
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: border-color .2s, background .2s;
  }
  .nn-checkbox:checked {
    background: var(--accent2);
    border-color: var(--accent2);
  }
  .nn-checkbox:checked::after {
    content: '';
    position: absolute;
    left: 3px; top: 0px;
    width: 5px; height: 9px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }

  /* ── RIGHT PANEL ── */
  .right-panel { display: flex; flex-direction: column; }

  .graph-area {
    flex: 1;
    position: relative;
    background: #fdfaf4;
    overflow: hidden;
  }

  canvas#lp-canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ── BOTTOM STRIP ── */
  .bottom-strip {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    box-shadow: 0 -2px 8px rgba(30,26,20,.06);
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 14px;
    min-width: 128px;
    box-shadow: var(--shadow);
    transition: box-shadow .4s, border-color .4s;
  }
  .stat-box .sb-label {
    font-size: .62rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 3px;
  }
  .stat-box .sb-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.05rem;
    color: var(--accent2);
    font-weight: 600;
  }
  .stat-box.highlight {
    border-color: var(--accent2);
    box-shadow: 0 0 0 2px rgba(46,125,79,.2), 0 4px 16px rgba(46,125,79,.2);
    animation: glowPulse 1s ease-in-out infinite alternate;
  }
  @keyframes glowPulse {
    from { box-shadow: 0 0 0 2px rgba(46,125,79,.1), 0 2px 8px rgba(46,125,79,.1); }
    to   { box-shadow: 0 0 0 3px rgba(46,125,79,.35), 0 4px 20px rgba(46,125,79,.3); }
  }

  .obj-slider-wrap {
    flex: 1;
    min-width: 160px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .obj-slider-wrap label {
    font-size: .7rem;
    color: var(--text2);
    white-space: nowrap;
    font-weight: 500;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border2);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    background: var(--obj);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(156,92,0,.4);
  }

  .btn-generate {
    background: var(--accent);
    border: none;
    color: #f5f0e8;
    font-family: 'Source Sans 3', sans-serif;
    font-size: .82rem;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 5px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s, box-shadow .2s;
    letter-spacing: .02em;
  }
  .btn-generate:hover { background: #0f2347; box-shadow: var(--glow); }

  .btn-optimize {
    background: var(--accent2);
    border: none;
    color: #fff;
    font-family: 'Source Sans 3', sans-serif;
    font-size: .82rem;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 5px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s, box-shadow .2s;
    display: none;
    letter-spacing: .02em;
  }
  .btn-optimize:hover { background: #1d5e35; box-shadow: var(--glow2); }
  .btn-optimize.visible { display: inline-block; }

  .corner-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 13px;
    min-width: 175px;
    box-shadow: var(--shadow);
  }
  .corner-box .sb-label {
    font-size: .62rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 5px;
  }
  .corner-list { display: flex; flex-direction: column; gap: 3px; }
  .corner-item {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .7rem;
    color: var(--text2);
    padding: 1px 0;
  }
  .corner-item.best { color: var(--accent2); font-weight: 600; }

  /* Legend */
  .legend {
    position: absolute;
    top: 14px; right: 14px;
    background: rgba(253,250,244,.92);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: .7rem;
    display: flex;
    flex-direction: column;
    gap: 6px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(4px);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
  }
  .legend-line { width: 26px; height: 3px; border-radius: 2px; }

  .canvas-tip {
    position: absolute;
    background: rgba(253,250,244,.97);
    border: 1px solid var(--border2);
    border-radius: 5px;
    padding: 6px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: .7rem;
    color: var(--text);
    pointer-events: none;
    display: none;
    box-shadow: var(--shadow);
  }

  .formula-display {
    margin-top: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: .78rem;
    color: var(--text2);
    line-height: 1.75;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 5px;
    border: 1px solid var(--border);
  }
  .formula-display .f-obj { color: var(--obj); font-weight: 600; }
  .formula-display .f-c1  { color: var(--c1); }
  .formula-display .f-c2  { color: var(--c2); }
  .formula-display .f-nn  { color: var(--text3); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>Linear Programming Explorer</h1>
  <span>2-Variable Interactive Model</span>
</header>

<div class="main-layout">

  <!-- ═══ LEFT PANEL ═══ -->
  <div class="left-panel">

    <div class="card">
      <div class="section-label">Objective Function</div>
      <div class="obj-row">
        <div class="toggle-btn">
          <button id="btn-max" class="active" onclick="setGoal('max')">Maximize</button>
          <button id="btn-min" onclick="setGoal('min')">Minimize</button>
        </div>
        <span class="obj-label">Z =</span>
      </div>
      <div class="coeff-row" style="margin-top:12px;">
        <input type="number" class="num-input" id="c1" value="5" oninput="updateModel()">
        <label>x₁  +</label>
        <input type="number" class="num-input" id="c2" value="4" oninput="updateModel()">
        <label>x₂</label>
      </div>
    </div>

    <div class="card">
      <div class="section-label">Functional Constraints</div>
      <div class="constraint-block">

        <div class="constraint-row c-color-1">
          <span class="c-label">C₁:</span>
          <input type="number" class="num-input" id="a11" value="6" oninput="updateModel()">
          <label>x₁ +</label>
          <input type="number" class="num-input" id="a12" value="4" oninput="updateModel()">
          <label>x₂</label>
          <select class="sign-sel" id="s1" onchange="updateModel()">
            <option value="le">≤</option>
            <option value="ge">≥</option>
            <option value="eq">=</option>
          </select>
          <input type="number" class="num-input" id="b1" value="24" oninput="updateModel()">
        </div>

        <div class="constraint-row c-color-2">
          <span class="c-label">C₂:</span>
          <input type="number" class="num-input" id="a21" value="1" oninput="updateModel()">
          <label>x₁ +</label>
          <input type="number" class="num-input" id="a22" value="2" oninput="updateModel()">
          <label>x₂</label>
          <select class="sign-sel" id="s2" onchange="updateModel()">
            <option value="le">≤</option>
            <option value="ge">≥</option>
            <option value="eq">=</option>
          </select>
          <input type="number" class="num-input" id="b2" value="6" oninput="updateModel()">
        </div>

        <label class="nn-note active" id="nn-label" onclick="toggleNN()">
          <input type="checkbox" class="nn-checkbox" id="nn-check" checked onchange="toggleNN()">
          x₁, x₂ ≥ 0 &nbsp;(non-negativity constraints)
        </label>
      </div>
    </div>

    <div class="card">
      <div class="section-label">Model Summary</div>
      <div class="formula-display" id="formula-display"></div>
    </div>

    <div class="card">
      <div class="section-label">Graph Window</div>
      <div class="coeff-row" style="flex-wrap:nowrap;gap:8px;">
        <label style="font-size:.75rem;color:var(--text2);white-space:nowrap">x-axis max:</label>
        <input type="number" class="num-input" id="xmax" value="10" oninput="updateModel()" style="width:65px">
        <label style="font-size:.75rem;color:var(--text2);white-space:nowrap">y-axis max:</label>
        <input type="number" class="num-input" id="ymax" value="10" oninput="updateModel()" style="width:65px">
      </div>
    </div>

  </div>

  <!-- ═══ RIGHT PANEL ═══ -->
  <div class="right-panel">
    <div class="graph-area">
      <canvas id="lp-canvas"></canvas>

      <div class="legend">
        <div class="legend-item">
          <div class="legend-line" style="background:var(--c1)"></div>
          <span>Constraint 1</span>
        </div>
        <div class="legend-item">
          <div class="legend-line" style="background:var(--c2)"></div>
          <span>Constraint 2</span>
        </div>
        <div class="legend-item">
          <div class="legend-line" style="background:rgba(46,125,79,.7);"></div>
          <span>Feasible Region</span>
        </div>
        <div class="legend-item">
          <div class="legend-line" style="background:var(--obj)"></div>
          <span>Objective Function</span>
        </div>
      </div>

      <div class="canvas-tip" id="canvas-tip"></div>
    </div>

    <div class="bottom-strip">

      <div class="stat-box" id="box-x1">
        <div class="sb-label">x₁ value</div>
        <div class="sb-val" id="val-x1">—</div>
      </div>
      <div class="stat-box" id="box-x2">
        <div class="sb-label">x₂ value</div>
        <div class="sb-val" id="val-x2">—</div>
      </div>
      <div class="stat-box" id="box-r1">
        <div class="sb-label">Resource 1 used</div>
        <div class="sb-val" id="val-r1">—</div>
      </div>
      <div class="stat-box" id="box-r2">
        <div class="sb-label">Resource 2 used</div>
        <div class="sb-val" id="val-r2">—</div>
      </div>
      <div class="stat-box" id="box-z">
        <div class="sb-label">Objective Z</div>
        <div class="sb-val" id="val-z" style="color:var(--obj)">—</div>
      </div>

      <div class="corner-box">
        <div class="sb-label">Corner Points</div>
        <div class="corner-list" id="corner-list"></div>
      </div>

      <div style="display:flex;flex-direction:column;gap:8px;min-width:180px;flex:1">
        <div class="obj-slider-wrap">
          <label>Slide Z-line:</label>
          <input type="range" id="obj-slider" min="0" max="100" value="30" oninput="onSlider()" disabled>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn-generate" id="btn-generate" onclick="generateObjLine()">Show Objective Line</button>
          <button class="btn-optimize" id="btn-optimize" onclick="optimize()">⬡ Optimize</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
let model = {
  goal: 'max',
  c: [5, 4],
  a: [[6,4],[1,2]],
  b: [24, 6],
  signs: ['le','le'],
  xmax: 10,
  ymax: 10,
};

let objLineActive = false;
let objSliderVal = 0.3;
let optimized = false;
let cornerPoints = [];
let bestCorner = null;

const canvas = document.getElementById('lp-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  draw();
}
window.addEventListener('resize', resizeCanvas);

function parseModel() {
  model.goal  = document.getElementById('btn-max').classList.contains('active') ? 'max' : 'min';
  model.c     = [+document.getElementById('c1').value, +document.getElementById('c2').value];
  model.a[0]  = [+document.getElementById('a11').value, +document.getElementById('a12').value];
  model.a[1]  = [+document.getElementById('a21').value, +document.getElementById('a22').value];
  model.b     = [+document.getElementById('b1').value, +document.getElementById('b2').value];
  model.signs = [document.getElementById('s1').value, document.getElementById('s2').value];
  model.xmax  = Math.max(1, +document.getElementById('xmax').value || 10);
  model.ymax  = Math.max(1, +document.getElementById('ymax').value || 10);
}

function isFeasible(x, y) {
  const enforceNN = document.getElementById('nn-check').checked;
  if (enforceNN && (x < -1e-9 || y < -1e-9)) return false;
  for (let i = 0; i < 2; i++) {
    const lhs = model.a[i][0]*x + model.a[i][1]*y;
    const rhs = model.b[i];
    if (model.signs[i] === 'le' && lhs > rhs + 1e-9) return false;
    if (model.signs[i] === 'ge' && lhs < rhs - 1e-9) return false;
    if (model.signs[i] === 'eq' && Math.abs(lhs - rhs) > 1e-9) return false;
  }
  return true;
}

function intersect(i, j) {
  const [[a,b],[c,d]] = [model.a[i], model.a[j]];
  const [e,f] = [model.b[i], model.b[j]];
  const det = a*d - b*c;
  if (Math.abs(det) < 1e-12) return null;
  return [(e*d - b*f)/det, (a*f - e*c)/det];
}

function computeCorners() {
  const candidates = [[0,0]];
  for (let i = 0; i < 2; i++) {
    const a = model.a[i][0], b = model.a[i][1], rhs = model.b[i];
    if (Math.abs(a) > 1e-9) candidates.push([rhs/a, 0]);
    if (Math.abs(b) > 1e-9) candidates.push([0, rhs/b]);
  }
  const p = intersect(0, 1);
  if (p) candidates.push(p);

  const enforceNN = document.getElementById('nn-check').checked;
  return candidates
    .map(([x,y]) => enforceNN ? [Math.max(0,x), Math.max(0,y)] : [x,y])
    .filter(([x,y]) => isFeasible(x,y))
    .filter(([x,y]) => x <= model.xmax*1.5 && y <= model.ymax*1.5);
}

function objVal(pt) { return model.c[0]*pt[0] + model.c[1]*pt[1]; }

function findOptimal() {
  cornerPoints = computeCorners();
  if (!cornerPoints.length) return null;
  let best = cornerPoints[0];
  for (const p of cornerPoints) {
    const v = objVal(p), bv = objVal(best);
    if (model.goal === 'max' ? v > bv : v < bv) best = p;
  }
  return best;
}

const PAD = { l: 58, r: 22, t: 22, b: 48 };
function W() { return canvas.width / devicePixelRatio; }
function H() { return canvas.height / devicePixelRatio; }
function tx(x) { return PAD.l + x / model.xmax * (W()-PAD.l-PAD.r); }
function ty(y) { return H() - PAD.b - y / model.ymax * (H()-PAD.t-PAD.b); }
function fromCanvas(cx, cy) {
  return [
    (cx-PAD.l)/(W()-PAD.l-PAD.r)*model.xmax,
    (H()-PAD.b-cy)/(H()-PAD.t-PAD.b)*model.ymax,
  ];
}

function draw() {
  const w = W(), h = H();
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#fdfaf4';
  ctx.fillRect(0,0,w,h);

  drawGrid(w, h);
  drawFeasibleRegion();
  drawConstraints();
  if (objLineActive) drawObjectiveLine();
  drawCornerDots();
  drawAxes(w, h);
  updateStats();
  updateFormula();
  updateCornerList();
}

function drawGrid(w, h) {
  ctx.strokeStyle = 'rgba(214,205,184,.6)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= Math.ceil(model.xmax); i++) {
    ctx.beginPath(); ctx.moveTo(tx(i), PAD.t); ctx.lineTo(tx(i), h-PAD.b); ctx.stroke();
  }
  for (let j = 0; j <= Math.ceil(model.ymax); j++) {
    ctx.beginPath(); ctx.moveTo(PAD.l, ty(j)); ctx.lineTo(w-PAD.r, ty(j)); ctx.stroke();
  }
}

function drawAxes(w, h) {
  ctx.strokeStyle = 'rgba(30,26,20,.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(PAD.l, PAD.t); ctx.lineTo(PAD.l, h-PAD.b);
  ctx.moveTo(PAD.l, h-PAD.b); ctx.lineTo(w-PAD.r, h-PAD.b);
  ctx.stroke();

  ctx.fillStyle = 'rgba(90,80,64,.65)';
  ctx.font = '11px IBM Plex Mono, monospace';
  ctx.textAlign = 'center';
  for (let i=0; i<=Math.ceil(model.xmax); i++) ctx.fillText(i, tx(i), h-PAD.b+16);
  ctx.textAlign = 'right';
  for (let j=0; j<=Math.ceil(model.ymax); j++) ctx.fillText(j, PAD.l-7, ty(j)+4);

  ctx.fillStyle = 'rgba(30,26,20,.5)';
  ctx.font = '600 12px IBM Plex Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('x₁', tx(model.xmax/2), h-PAD.b+34);
  ctx.save(); ctx.translate(15, ty(model.ymax/2)); ctx.rotate(-Math.PI/2);
  ctx.fillText('x₂', 0, 0); ctx.restore();
}

function linePoints(i) {
  const [a,b] = model.a[i], rhs = model.b[i];
  let pts = [];
  if (Math.abs(a) > 1e-9) { pts.push([rhs/a, 0]); pts.push([(rhs-b*model.ymax)/a, model.ymax]); }
  if (Math.abs(b) > 1e-9) { pts.push([0, rhs/b]); pts.push([model.xmax, (rhs-a*model.xmax)/b]); }
  pts = pts.filter(([x,y]) => x >= -.5 && x <= model.xmax+.5 && y >= -.5 && y <= model.ymax+.5);
  if (pts.length < 2) return null;
  return [pts[0], pts[pts.length-1]];
}

function drawConstraints() {
  const colors = ['#1a3a6b','#b83232'];
  for (let i=0; i<2; i++) {
    const pts = linePoints(i);
    if (!pts) continue;
    ctx.beginPath();
    ctx.moveTo(tx(pts[0][0]), ty(pts[0][1]));
    ctx.lineTo(tx(pts[1][0]), ty(pts[1][1]));
    ctx.strokeStyle = colors[i];
    ctx.lineWidth = 2.5;
    ctx.setLineDash([]);
    ctx.stroke();

    const mx = (pts[0][0]+pts[1][0])/2, my = (pts[0][1]+pts[1][1])/2;
    ctx.font = '600 11px IBM Plex Mono, monospace';
    ctx.fillStyle = colors[i];
    ctx.textAlign = 'left';
    ctx.fillText(`C${i+1}`, tx(mx)+6, ty(my)-5);
  }
}

function drawFeasibleRegion() {
  const w = W(), h = H();
  const imgW = Math.floor(w-PAD.l-PAD.r);
  const imgH = Math.floor(h-PAD.t-PAD.b);
  if (imgW<=0||imgH<=0) return;

  const off = document.createElement('canvas');
  off.width = imgW; off.height = imgH;
  const oc = off.getContext('2d');
  const id = oc.createImageData(imgW, imgH);

  for (let px=0; px<imgW; px++) {
    for (let py=0; py<imgH; py++) {
      const x = (px/imgW)*model.xmax;
      const y = ((imgH-1-py)/imgH)*model.ymax;
      if (isFeasible(x,y)) {
        const idx = (py*imgW+px)*4;
        id.data[idx]=46; id.data[idx+1]=125; id.data[idx+2]=79; id.data[idx+3]=40;
      }
    }
  }
  oc.putImageData(id,0,0);
  ctx.drawImage(off,PAD.l,PAD.t,imgW,imgH);

  const corners = computeCorners().filter(([x,y])=>x>=0&&y>=0);
  if (corners.length>=3) {
    const cx=corners.reduce((s,p)=>s+p[0],0)/corners.length;
    const cy=corners.reduce((s,p)=>s+p[1],0)/corners.length;
    corners.sort((a,b)=>Math.atan2(a[1]-cy,a[0]-cx)-Math.atan2(b[1]-cy,b[0]-cx));
    ctx.beginPath();
    ctx.moveTo(tx(corners[0][0]),ty(corners[0][1]));
    for (let i=1;i<corners.length;i++) ctx.lineTo(tx(corners[i][0]),ty(corners[i][1]));
    ctx.closePath();
    ctx.strokeStyle='rgba(46,125,79,.75)';
    ctx.setLineDash([6,4]);
    ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawObjectiveLine() {
  const [c1,c2] = model.c;
  if (Math.abs(c1)<1e-9 && Math.abs(c2)<1e-9) return;

  const allZ = cornerPoints.map(p=>objVal(p));
  if (!allZ.length) return;
  let zMin=Math.min(...allZ)*(model.goal==='max'?0.05:1.5);
  let zMax=Math.max(...allZ)*(model.goal==='max'?1.5:0.05);
  if (zMin>zMax)[zMin,zMax]=[zMax,zMin];
  const zRange=zMax-zMin||1;
  zMin-=zRange*.1; zMax+=zRange*.1;
  const Z=zMin+objSliderVal*(zMax-zMin);

  let pts=[];
  if (Math.abs(c2)>1e-9) {
    pts.push([0,Z/c2]);
    pts.push([model.xmax,(Z-c1*model.xmax)/c2]);
    if (Math.abs(c1)>1e-9) pts.push([Z/c1,0]);
    if (Math.abs(c1)>1e-9) pts.push([(Z-c2*model.ymax)/c1,model.ymax]);
  } else {
    if (Math.abs(c1)>1e-9) { pts.push([Z/c1,0]); pts.push([Z/c1,model.ymax]); }
  }
  pts=pts.filter(([x,y])=>x>=-0.01&&x<=model.xmax+.01&&y>=-0.01&&y<=model.ymax+.01);
  if (pts.length<2) return;

  ctx.beginPath();
  ctx.moveTo(tx(pts[0][0]),ty(pts[0][1]));
  ctx.lineTo(tx(pts[pts.length-1][0]),ty(pts[pts.length-1][1]));
  ctx.strokeStyle='#9c5c00';
  ctx.lineWidth=2.5;
  ctx.setLineDash([9,5]);
  ctx.stroke();
  ctx.setLineDash([]);

  const mx=(pts[0][0]+pts[pts.length-1][0])/2;
  const my=(pts[0][1]+pts[pts.length-1][1])/2;
  ctx.font='600 11px IBM Plex Mono, monospace';
  ctx.fillStyle='#9c5c00';
  ctx.textAlign='left';
  ctx.fillText(`Z = ${Z.toFixed(1)}`, tx(mx)+6, ty(my)-7);

  updateSliderStats(Z);
}

function updateSliderStats(Z) {
  document.getElementById('val-z').textContent = Z.toFixed(2);
  document.getElementById('val-x1').textContent = '—';
  document.getElementById('val-x2').textContent = '—';
  document.getElementById('val-r1').textContent = '—';
  document.getElementById('val-r2').textContent = '—';
}

function drawCornerDots() {
  const corners = computeCorners();
  cornerPoints = corners;
  bestCorner = findOptimal();

  for (const p of corners) {
    const isBest = bestCorner && Math.abs(p[0]-bestCorner[0])<1e-6 && Math.abs(p[1]-bestCorner[1])<1e-6 && optimized;
    ctx.beginPath();
    ctx.arc(tx(p[0]),ty(p[1]),isBest?7:4.5,0,Math.PI*2);
    ctx.fillStyle = isBest ? '#2e7d4f' : 'rgba(30,26,20,.6)';
    if (isBest) {
      ctx.shadowColor='#2e7d4f'; ctx.shadowBlur=14;
    }
    ctx.fill();
    ctx.shadowBlur=0;

    // White ring for best
    if (isBest) {
      ctx.beginPath(); ctx.arc(tx(p[0]),ty(p[1]),7,0,Math.PI*2);
      ctx.strokeStyle='rgba(46,125,79,.4)'; ctx.lineWidth=3; ctx.stroke();
    }

    ctx.font='10px IBM Plex Mono, monospace';
    ctx.fillStyle = isBest ? '#1d5e35' : 'rgba(90,80,64,.75)';
    ctx.textAlign='left';
    ctx.fillText(`(${p[0].toFixed(1)}, ${p[1].toFixed(1)})`, tx(p[0])+9, ty(p[1])-6);
  }
}

function updateStats() {
  if (!optimized || !bestCorner) return;
  const [x1,x2]=bestCorner;
  const r1=model.a[0][0]*x1+model.a[0][1]*x2;
  const r2=model.a[1][0]*x1+model.a[1][1]*x2;
  const z=model.c[0]*x1+model.c[1]*x2;
  document.getElementById('val-x1').textContent=x1.toFixed(3);
  document.getElementById('val-x2').textContent=x2.toFixed(3);
  document.getElementById('val-r1').textContent=`${r1.toFixed(2)} / ${model.b[0]}`;
  document.getElementById('val-r2').textContent=`${r2.toFixed(2)} / ${model.b[1]}`;
  document.getElementById('val-z').textContent=z.toFixed(3);
}

function updateFormula() {
  const [c1,c2]=model.c;
  const goal=model.goal==='max'?'Maximize':'Minimize';
  const row=(i)=>{
    const [a,b]=model.a[i], rhs=model.b[i];
    const sign=['≤','≥','='][['le','ge','eq'].indexOf(model.signs[i])];
    const as=(v,first)=>first?`${v}`:(v>=0?` + ${v}`:` − ${Math.abs(v)}`);
    return `${as(a,true)} x₁ ${a>=0?' +':' −'} ${Math.abs(b)} x₂ ${sign} ${rhs}`;
  };
  document.getElementById('formula-display').innerHTML=`
    <span class="f-obj">${goal} Z = ${c1} x₁ + ${c2} x₂</span><br>
    Subject to:<br>
    <span class="f-c1">  ${row(0)}</span><br>
    <span class="f-c2">  ${row(1)}</span><br>
    <span class="f-nn">  x₁, x₂ ≥ 0</span>
  `;
}

function updateCornerList() {
  const list=document.getElementById('corner-list');
  cornerPoints=computeCorners();
  bestCorner=findOptimal();
  if (!cornerPoints.length) {
    list.innerHTML='<div class="corner-item" style="color:var(--accent3)">No feasible region</div>';
    return;
  }
  list.innerHTML=cornerPoints.map(p=>{
    const z=objVal(p);
    const isBest=bestCorner&&Math.abs(p[0]-bestCorner[0])<1e-6&&Math.abs(p[1]-bestCorner[1])<1e-6;
    return `<div class="corner-item${isBest&&optimized?' best':''}">(${p[0].toFixed(2)}, ${p[1].toFixed(2)}) → Z=${z.toFixed(2)}${isBest&&optimized?' ★':''}</div>`;
  }).join('');
}

function toggleNN() {
  const cb=document.getElementById('nn-check');
  const label=document.getElementById('nn-label');
  label.classList.toggle('active', cb.checked);
  optimized=false; clearHighlights(); draw();
}

function setGoal(g) {
  model.goal=g;
  document.getElementById('btn-max').classList.toggle('active',g==='max');
  document.getElementById('btn-min').classList.toggle('active',g==='min');
  optimized=false; clearHighlights(); draw();
}

function updateModel() {
  parseModel(); optimized=false; clearHighlights(); draw();
}

function generateObjLine() {
  parseModel();
  cornerPoints=computeCorners();
  if (!cornerPoints.length) return;
  objLineActive=true; optimized=false; clearHighlights();
  const slider=document.getElementById('obj-slider');
  slider.disabled=false;
  slider.value=model.goal==='max'?25:75;
  objSliderVal=+slider.value/100;
  document.getElementById('btn-optimize').classList.add('visible');
  draw();
}

function onSlider() {
  optimized=false; clearHighlights();
  objSliderVal=+document.getElementById('obj-slider').value/100;
  draw();
}

function optimize() {
  parseModel();
  cornerPoints=computeCorners();
  bestCorner=findOptimal();
  if (!bestCorner) return;

  const allZ=cornerPoints.map(p=>objVal(p));
  let zMin=Math.min(...allZ)*(model.goal==='max'?0.05:1.5);
  let zMax=Math.max(...allZ)*(model.goal==='max'?1.5:0.05);
  if (zMin>zMax)[zMin,zMax]=[zMax,zMin];
  const zRange=zMax-zMin||1;
  zMin-=zRange*.1; zMax+=zRange*.1;
  const optZ=objVal(bestCorner);
  const targetSlider=(optZ-zMin)/(zMax-zMin)*100;
  const startSlider=+document.getElementById('obj-slider').value;
  const duration=900, start=performance.now();

  function animStep(now) {
    const t=Math.min((now-start)/duration,1);
    const ease=t<.5?2*t*t:-1+(4-2*t)*t;
    const val=startSlider+(targetSlider-startSlider)*ease;
    document.getElementById('obj-slider').value=val;
    objSliderVal=val/100;
    draw();
    if (t<1) { requestAnimationFrame(animStep); }
    else {
      objSliderVal=targetSlider/100; optimized=true; draw();
      ['box-x1','box-x2','box-r1','box-r2','box-z'].forEach(id=>document.getElementById(id).classList.add('highlight'));
    }
  }
  requestAnimationFrame(animStep);
}

function clearHighlights() {
  ['box-x1','box-x2','box-r1','box-r2','box-z'].forEach(id=>document.getElementById(id).classList.remove('highlight'));
}

canvas.addEventListener('mousemove',(e)=>{
  const rect=canvas.getBoundingClientRect();
  const [x,y]=fromCanvas(e.clientX-rect.left, e.clientY-rect.top);
  if (x<0||y<0||x>model.xmax||y>model.ymax) { document.getElementById('canvas-tip').style.display='none'; return; }
  const feasible=isFeasible(x,y);
  const z=model.c[0]*x+model.c[1]*y;
  const tip=document.getElementById('canvas-tip');
  tip.style.display='block';
  tip.style.left=(e.clientX-canvas.getBoundingClientRect().left+14)+'px';
  tip.style.top=(e.clientY-canvas.getBoundingClientRect().top-10)+'px';
  tip.innerHTML=`x₁=${x.toFixed(2)}, x₂=${y.toFixed(2)}<br>Z=${z.toFixed(2)} · ${feasible?'<span style="color:#2e7d4f">✓ feasible</span>':'<span style="color:#b83232">✗ infeasible</span>'}`;
});
canvas.addEventListener('mouseleave',()=>{ document.getElementById('canvas-tip').style.display='none'; });

parseModel();
resizeCanvas();
draw();
</script>
</body>
</html>
